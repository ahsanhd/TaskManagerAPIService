services:
  - type: web
    name: task-management-api
    env: docker
    plan: starter
    healthCheckPath: /
    dockerfilePath: ./Dockerfile
    disk:
      name: task-management-api-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:/var/data/dev.db
      - key: JWT_SECRET
        generateValue: true
